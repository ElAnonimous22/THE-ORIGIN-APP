<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ORIGIN - Caja Fuerte de Credenciales</title>
    <style>
        :root {
            --bg-main: #060614; 
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.06);
            --accent-purple: #c084fc; 
            --accent-cyan: #22d3ee;   
            --text-main: #f8fafc;
            --text-muted: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }

        body {
            background: #060614;
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: radial-gradient(circle at 50% 0%, #1c1437 0%, #060614 100%);
        }

        .container { 
            width: 100%; 
            max-width: 650px; 
            animation: systemInit 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            z-index: 1;
        }

        @keyframes systemInit {
            from { opacity: 0; transform: translateY(20px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .panel {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { font-size: 1.6rem; font-weight: 700; text-align: center; margin-bottom: 5px; }
        .subtitle { color: var(--accent-purple); text-align: center; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px; font-weight: 700; }

        /* FORMULARIO */
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 0.8rem;
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            font-weight: 600;
        }
        input, select {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px;
            border-radius: 12px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus, select:focus {
            border-color: var(--accent-purple);
        }
        select option {
            background: #121226;
            color: #fff;
        }

        /* TABLA / LISTADO */
        .search-box {
            margin-top: 25px;
            margin-bottom: 15px;
        }
        .vault-header {
            font-size: 1rem;
            color: var(--text-main);
            margin-bottom: 10px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .credentials-list {
            max-height: 250px;
            overflow-y: auto;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255,255,255,0.03);
        }
        .credential-item {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 0.85rem;
            gap: 10px;
        }
        .credential-item:last-child { border-none; }
        .badge {
            background: rgba(34, 211, 238, 0.1);
            color: var(--accent-cyan);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
            width: fit-content;
        }
        .btn-delete {
            background: transparent;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 1rem;
            padding: 0 5px;
            transition: transform 0.1s;
        }
        .btn-delete:hover { transform: scale(1.2); }

        /* BOTONES */
        .btn { background: var(--accent-purple); color: #000; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: 700; width: 100%; margin-top: 10px; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); font-size: 0.9rem; }
        .btn:hover { transform: translateY(-1px); opacity: 0.95; box-shadow: 0 5px 15px rgba(192, 132, 252, 0.3); }
        
        .btn-back { background: var(--accent-cyan); color: #000; text-decoration: none; display: block; text-align: center; margin-top: 15px; }
        .btn-back:hover { box-shadow: 0 5px 15px rgba(34, 211, 238, 0.4); }

        /* SCROLLBAR PERSONALIZADO */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        /* RESPONSIVIDAD SÚPER OPTIMIZADA PARA MÓVILES */
        @media (max-width: 520px) {
            .panel { padding: 20px; }
            .vault-header { flex-direction: column; align-items: flex-start; }
            .vault-header input { width: 100% !important; margin-top: 8px; }
            .credential-item {
                grid-template-columns: 1fr;
                gap: 6px;
                padding: 15px;
                position: relative;
            }
            .btn-delete {
                position: absolute;
                top: 15px;
                right: 15px;
            }
        }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div class="container">
        <div class="panel">
            <h1>CUPO DE CREDENCIALES</h1>
            <p class="subtitle">Módulo de Almacenamiento Seguro</p>

            <form id="passwordForm" onsubmit="addCredential(event)">
                <div class="form-group">
                    <label for="site">¿De qué es? (Plataforma / Web)</label>
                    <input type="text" id="site" placeholder="Ej: Netflix, Google, Discord" required>
                </div>
                
                <div class="form-group">
                    <label for="username">Nombre de Usuario / Email</label>
                    <input type="text" id="username" placeholder="Ej: tu_usuario o correo@mail.com" required>
                </div>

                <div class="form-group">
                    <label for="category">Categoría</label>
                    <select id="category">
                        <option value="Redes Sociales">🌐 Redes Sociales</option>
                        <option value="Trabajo/Estudios">💼 Trabajo / Estudios</option>
                        <option value="Entretenimiento">🎮 Entretenimiento</option>
                        <option value="Finanzas">💰 Finanzas</option>
                        <option value="Otros">⚡ Otros</option>
                    </select>
                </div>

                <button type="submit" class="btn">🔑 Encriptar y Guardar</button>
            </form>

            <div class="search-box">
                <div class="vault-header">
                    <span>Registros Guardados</span>
                    <input type="text" id="search" placeholder="🔍 Buscar por plataforma..." oninput="renderCredentials()" style="width: 180px; padding: 6px 10px; font-size: 0.8rem;">
                </div>

                <div class="credentials-list" id="credentialsList">
                    </div>
            </div>

            <a href="menuprincipal.html" class="btn btn-back">⬅ Volver al Menú Principal</a>
        </div>
    </div>

    <script>
        // --- SISTEMA DE AUDIO DIGITAL SINTETIZADO ---
        let audioCtx = null;
        function playTone(freq, type, duration, vol) {
            const sfxEnabled = localStorage.getItem('origin_sfx') !== 'false';
            if (!sfxEnabled) return;

            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                const masterVol = localStorage.getItem('origin_volume') ? parseInt(localStorage.getItem('origin_volume')) / 100 : 0.7;

                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol * masterVol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        function soundClick() { playTone(600, 'sine', 0.08, 0.1); }
        function soundSuccess() { playTone(523.25, 'sine', 0.1, 0.15); setTimeout(() => playTone(659.25, 'sine', 0.2, 0.15), 80); }
        function soundDelete() { playTone(300, 'sawtooth', 0.15, 0.1); }

        // --- LÓGICA DE CREDENCIALES (LOCALSTORAGE) ---
        let credentials = JSON.parse(localStorage.getItem('origin_credentials')) || [];

        function addCredential(e) {
            e.preventDefault();
            
            const site = document.getElementById('site').value;
            const username = document.getElementById('username').value;
            const category = document.getElementById('category').value;

            const newCred = { id: Date.now(), site, username, category };
            credentials.push(newCred);
            
            localStorage.setItem('origin_credentials', JSON.stringify(credentials));
            soundSuccess();
            
            document.getElementById('passwordForm').reset();
            renderCredentials();
        }

        function deleteCredential(id) {
            credentials = credentials.filter(c => c.id !== id);
            localStorage.setItem('origin_credentials', JSON.stringify(credentials));
            soundDelete();
            renderCredentials();
        }

        function renderCredentials() {
            const list = document.getElementById('credentialsList');
            const searchVal = document.getElementById('search').value.toLowerCase();
            list.innerHTML = '';

            const filtered = credentials.filter(c => c.site.toLowerCase().includes(searchVal));

            if(filtered.length === 0) {
                list.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-muted); font-size: 0.85rem;">Caja fuerte vacía o sin coincidencias</div>';
                return;
            }

            filtered.forEach(c => {
                const item = document.createElement('div');
                item.className = 'credential-item';
                item.innerHTML = `
                    <div style="font-weight: 600; color: #fff;">${c.site}</div>
                    <div style="color: #cbd5e1;">${c.username}</div>
                    <div><span class="badge">${c.category}</span></div>
                    <div><button class="btn-delete" onclick="deleteCredential(${c.id})">🗑️</button></div>
                `;
                list.appendChild(item);
            });
        }

        // --- MOTOR DE ANIMACIÓN CANVAS ---
        function initBgAnimation() {
            const canvas = document.getElementById('bgCanvas');
            if (localStorage.getItem('origin_canvas') === 'false') return;
            
            const ctx = canvas.getContext('2d');
            let particles = [];
            
            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            window.addEventListener('resize', resize);
            resize();

            for(let i = 0; i < 40; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 2 + 0.5,
                    vx: (Math.random() - 0.5) * 0.2,
                    vy: (Math.random() - 0.5) * 0.2,
                    color: Math.random() > 0.5 ? 'rgba(34, 211, 238,' : 'rgba(192, 132, 252,',
                    alpha: Math.random() * 0.4 + 0.1
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let grad = ctx.createRadialGradient(canvas.width/2, 0, 10, canvas.width/2, 0, canvas.height);
                grad.addColorStop(0, '#1c1437');
                grad.addColorStop(1, '#060614');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                particles.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                    if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                    ctx.beginPath();
                    ctx.fillStyle = p.color + p.alpha + ')';
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fill();
                });
                requestAnimationFrame(animate);
            }
            animate();
        }

        window.onload = () => {
            renderCredentials();
            initBgAnimation();
            document.querySelectorAll('.btn, .btn-back, select, input').forEach(el => {
                el.addEventListener('click', soundClick);
            });
        };
    </script>
</body>
</html>
