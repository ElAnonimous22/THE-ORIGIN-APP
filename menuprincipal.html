<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE ORIGIN - Dashboard</title>
    <style>
        /* 1. VARIABLES DE COLOR Y ESTILO PREMIUM */
        :root {
            --bg-main: #0c0c1e;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-hover: rgba(255, 255, 255, 0.07);
            --accent-purple: #c084fc;
            --accent-cyan: #22d3ee;
            --accent-green: #34d399;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background-color: var(--bg-main);
            /* Degradados fluidos de fondo basados en tu imagen */
            background-image: 
                radial-gradient(circle at 80% 20%, rgba(192, 132, 252, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 20% 80%, rgba(34, 211, 238, 0.1) 0%, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 24px 20px 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 480px; /* Centrado y perfecto para móvil */
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* 2. CABECERA CON SALUDO DINÁMICO */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .greeting h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .greeting p {
            font-size: 0.9rem;
            color: var(--accent-purple);
            font-weight: 500;
            margin-top: 2px;
        }

        .time-badge {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 8px 14px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            font-weight: 600;
            font-size: 0.9rem;
            color: #fff;
        }

        /* 3. TARJETA DE NIVEL (ESTILO RPG LIMPIO) */
        .level-card {
            background: linear-gradient(135deg, rgba(192, 132, 252, 0.1), rgba(34, 211, 238, 0.05));
            border: 1px solid rgba(192, 132, 252, 0.2);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .level-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .level-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: #fff;
        }

        .level-badge {
            background: var(--accent-purple);
            color: #0c0c1e;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.8rem;
        }

        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 65%; /* Nivel de progreso actual */
            background: linear-gradient(to right, var(--accent-purple), var(--accent-cyan));
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(192, 132, 252, 0.5);
        }

        .level-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* 4. TARJETAS DE ESTADO RÁPIDO (VITALS) */
        .vitals-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .vital-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .vital-icon {
            font-size: 1.5rem;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .vital-info .v-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .vital-info .v-val {
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            margin-top: 2px;
        }

        /* 5. SEGMENTO DE FILTROS */
        .tabs-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .tabs-container::-webkit-scrollbar { display: none; }

        .tab-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: #fff;
            color: #0c0c1e;
            border-color: #fff;
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
        }

        /* 6. REJILLA DE APLICACIONES ESTILO iOS DE PRIMER NIVEL */
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            row-gap: 20px;
            column-gap: 12px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 24px 16px;
            border-radius: 24px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            gap: 8px;
            transition: transform 0.2s;
        }

        .app-item:active {
            transform: scale(0.9);
        }

        .app-icon-wrapper {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }

        .app-item:hover .app-icon-wrapper {
            border-color: rgba(255,255,255,0.2);
            background: var(--glass-hover);
        }

        .app-title {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
            text-align: center;
            max-width: 64px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="greeting">
                <h1 id="welcome-text">Hola, Operador</h1>
                <p>THE ORIGIN — Sistema de Vida</p>
            </div>
            <div class="time-badge" id="live-clock">00:00</div>
        </header>

        <div class="level-card">
            <div class="level-header">
                <span class="level-title">Progreso del Avatar</span>
                <span class="level-badge">LVL 14</span>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar-fill"></div>
            </div>
            <div class="level-stats">
                <span>6,500 / 10,000 XP</span>
                <span>65% para LVL 15</span>
            </div>
        </div>

        <div class="vitals-row">
            <div class="vital-card">
                <div class="vital-icon">💎</div>
                <div class="vital-info">
                    <span class="v-label">Créditos</span>
                    <div class="v-val">940 OC</div>
                </div>
            </div>
            <div class="vital-card">
                <div class="vital-icon">⚡</div>
                <div class="vital-info">
                    <span class="v-label">Misión</span>
                    <div class="v-val" style="font-size: 0.85rem; color: var(--accent-cyan); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px;">Crear Ecosistema</div>
                </div>
            </div>
        </div>

        <div class="tabs-container">
            <button class="tab-btn active" onclick="filterModules('all', this)">Todo</button>
            <button class="tab-btn" onclick="filterModules('core', this)">Core</button>
            <button class="tab-btn" onclick="filterModules('bio', this)">Bio-Perf</button>
            <button class="tab-btn" onclick="filterModules('imp', this)">Imperio</button>
            <button class="tab-btn" onclick="filterModules('utils', this)">Utils</button>
        </div>

        <main class="apps-grid" id="apps-container">
            </main>
    </div>

    <script>
        // BASE DE DATOS DE LAS 29 APLICACIONES REQUERIDAS
        const originApps = [
            { name: "Perfil", icon: "👤", cat: "core", url: "perfil.html" },
            { name: "Vault", icon: "🔒", cat: "core", url: "vault.html" },
            { name: "Settings", icon: "⚙️", cat: "core", url: "settings.html" },
            { name: "Passwords", icon: "🔑", cat: "core", url: "passwords.html" },
            
            { name: "Deporte", icon: "🏃‍♂️", cat: "bio", url: "deporte.html" },
            { name: "Cook", icon: "🍳", cat: "bio", url: "cook.html" },
            { name: "Health", icon: "❤️", cat: "bio", url: "health.html" },
            { name: "SLEEP", icon: "💤", cat: "bio", url: "sleep.html" },
            { name: "Pets", icon: "🐾", cat: "bio", url: "pets.html" },
            { name: "Meditation", icon: "🧘‍♂️", cat: "bio", url: "meditation.html" },
            { name: "Journal", icon: "📖", cat: "bio", url: "journal.html" },
            
            { name: "Business", icon: "💼", cat: "imp", url: "business.html" },
            { name: "Student", icon: "👨‍🎓", cat: "imp", url: "student.html" },
            { name: "Academy", icon: "🎓", cat: "imp", url: "academy.html" },
            { name: "Motivation", icon: "🔥", cat: "imp", url: "motivation.html" },
            { name: "Practique", icon: "🃏", cat: "imp", url: "practique.html" },
            { name: "Tasks", icon: "📋", cat: "imp", url: "tasks.html" },
            { name: "Habits", icon: "🔁", cat: "imp", url: "habits.html" },
            
            { name: "AI", icon: "🤖", cat: "utils", url: "ai.html" },
            { name: "Notes", icon: "📝", cat: "utils", url: "notes.html" },
            { name: "Time", icon: "⏳", cat: "utils", url: "time.html" },
            { name: "Point Shop", icon: "💎", cat: "utils", url: "pointshop.html" },
            { name: "Paint", icon: "🎨", cat: "utils", url: "paint.html" },
            { name: "Contacts", icon: "📇", cat: "utils", url: "contacts.html" },
            { name: "Maths", icon: "➗", cat: "utils", url: "maths.html" },
            { name: "Maps", icon: "📍", cat: "utils", url: "maps.html" },
            { name: "Docs", icon: "📂", cat: "utils", url: "docs.html" },
            { name: "Kids", icon: "🧸", cat: "utils", url: "kids.html" },
            { name: "Money", icon: "💸", cat: "utils", url: "money.html" },
            { name: "Music", icon: "🎧", cat: "utils", url: "music.html" }
        ];

        // RENDERIZADO CON FILTROS ANIMADOS
        function buildGrid(módulo = 'all') {
            const container = document.getElementById('apps-container');
            container.innerHTML = '';
            
            originApps.forEach(app => {
                if (módulo === 'all' || app.cat === módulo) {
                    const link = document.createElement('a');
                    link.href = app.url;
                    link.className = 'app-item';
                    link.innerHTML = `
                        <div class="app-icon-wrapper">${app.icon}</div>
                        <span class="app-title">${app.name}</span>
                    `;
                    container.appendChild(link);
                }
            });
        }

        function filterModules(módulo, button) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
            buildGrid(módulo);
        }

        // SALUDO INTELIGENTE Y RELOJ EN VIVO
        function updateHUD() {
            const now = new Date();
            const hrs = now.getHours();
            
            // Reloj formateado
            document.getElementById('live-clock').innerText = 
                now.toTimeString().split(' ')[0].substring(0, 5);

            // Saludo adaptativo
            let greeting = "Hola, Operador";
            if (hrs >= 6 && hrs < 13) greeting = "Buenos días, Bro";
            else if (hrs >= 13 && hrs < 20) greeting = "Buenas tardes, Bro";
            else greeting = "Buenas noches, Bro";
            
            document.getElementById('welcome-text').innerText = greeting;
        }

        // ARRANQUE AUTOMÁTICO
        buildGrid();
        updateHUD();
        setInterval(updateHUD, 60000); // Actualiza reloj cada minuto
    </script>
</body>
</html>
