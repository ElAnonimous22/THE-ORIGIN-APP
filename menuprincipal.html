<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE ORIGIN - Dashboard Pro</title>
    <style>
        /* 1. VARIABLES DE ESTILO PREMIUM (GLASSMORPHISM EXTENDIDO) */
        :root {
            --bg-main: #060614; 
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.06);
            --glass-hover: rgba(255, 255, 255, 0.10);
            --accent-purple: #c084fc; 
            --accent-cyan: #22d3ee;   
            --accent-neon-glow: rgba(34, 211, 238, 0.3);
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --anim-space: cubic-bezier(0.25, 1, 0.5, 1);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        body {
            background-color: var(--bg-main);
            background-image: 
                radial-gradient(circle at 85% 15%, rgba(192, 132, 252, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 15% 85%, rgba(34, 211, 238, 0.08) 0%, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 24px 20px 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* LIENZO DE PARTÍCULAS / ESTRELLAS DE FONDO */
        #bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        .main-container {
            width: 100%;
            max-width: 1200px; 
            display: flex;
            flex-direction: column;
            gap: 24px;
            animation: fadeInHUD 0.8s var(--anim-space);
        }

        /* 2. CABECERA CON SALUDO, RELOJ Y ANIMACIÓN DE ENTRADA */
        header {
            display: flex;
            flex-direction: column; 
            justify-content: space-between;
            align-items: flex-start;
            gap: 15px;
            margin-top: 10px;
            width: 100%;
        }

        @media (min-width: 768px) {
            header {
                flex-direction: row; 
                align-items: center;
            }
        }

        .greeting h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.7px;
            background: linear-gradient(135deg, #ffffff 30%, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .greeting .subtitle {
            font-size: 0.95rem;
            color: var(--accent-purple); 
            font-weight: 600;
            margin-top: 5px;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(192, 132, 252, 0.4);
        }

        /* CONTENEDOR DEL RELOJ Y LA FECHA */
        .time-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
        }

        @media (min-width: 768px) {
            .time-container {
                align-items: flex-end;
            }
        }

        .date-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            color: var(--accent-purple);
            text-shadow: 0 0 8px rgba(192, 132, 252, 0.3);
            padding-right: 4px;
        }

        .time-badge {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 12px 22px;
            border-radius: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            font-weight: 700;
            font-size: 1.2rem;
            color: #fff;
            letter-spacing: 1px;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.1), 0 10px 25px rgba(0,0,0,0.4);
            font-variant-numeric: tabular-nums; 
            transition: border-color 0.3s;
        }
        .time-badge:hover {
            border-color: var(--accent-cyan);
        }

        /* 3. PANEL DE STATS AJUSTADO SIN LA MISIÓN */
        .stats-layout {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        .stat-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            transition: transform 0.3s var(--anim-space), border-color 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255,255,255,0.15);
        }

        .stat-icon { 
            font-size: 1.6rem; 
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.2));
        }
        .stat-info .stat-label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 700; }
        .stat-info .stat-val { font-size: 1.3rem; font-weight: 800; color: #fff; margin-top: 2px; }

        .xp-card {
            border-color: rgba(192, 132, 252, 0.15);
        }
        .xp-card .stat-val {
            color: var(--accent-purple);
            text-shadow: 0 0 12px rgba(192, 132, 252, 0.3);
        }

        .mp-card {
            background: linear-gradient(135deg, rgba(34, 211, 238, 0.05), rgba(255, 255, 255, 0.005));
            border-color: rgba(34, 211, 238, 0.2);
        }
        .mp-card .stat-val { 
            color: var(--accent-cyan); 
            text-shadow: 0 0 12px rgba(34, 211, 238, 0.4);
        }

        /* 4. TABS FILTROS DISEÑO ELÁSTICO */
        .tabs-row {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 6px;
            width: 100%;
        }
        .tabs-row::-webkit-scrollbar { display: none; }

        .tab-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: #94a3b8;
            padding: 12px 24px;
            border-radius: 16px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.25s var(--anim-space);
        }

        .tab-btn:hover {
            color: #fff;
            background: var(--glass-hover);
            border-color: rgba(255,255,255,0.2);
        }

        .tab-btn.active {
            background: #ffffff;
            color: #060614;
            border-color: #ffffff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2), 0 4px 12px rgba(0,0,0,0.3);
            transform: scale(1.02);
        }

        /* 5. REJILLA DE APPS GAMER PREMIUM */
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            row-gap: 28px;
            column-gap: 18px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 28px;
            border-radius: 28px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.02), 0 15px 35px rgba(0,0,0,0.3);
        }

        @media (min-width: 600px) { .apps-grid { grid-template-columns: repeat(6, 1fr); } }
        @media (min-width: 900px) { .apps-grid { grid-template-columns: repeat(8, 1fr); } }
        @media (min-width: 1200px) { .apps-grid { grid-template-columns: repeat(10, 1fr); } }

        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            gap: 10px;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .app-item:active { transform: scale(0.88); }

        .app-icon-wrapper {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0 6px 16px rgba(0,0,0,0.2);
            transition: all 0.3s var(--anim-space);
            position: relative;
        }

        .app-item:hover .app-icon-wrapper {
            border-color: var(--accent-cyan);
            background: var(--glass-hover);
            transform: translateY(-5px);
            box-shadow: 0 0 20px var(--accent-neon-glow), 0 8px 20px rgba(0,0,0,0.4);
        }

        .app-title {
            font-size: 0.78rem;
            color: #94a3b8;
            font-weight: 600;
            text-align: center;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: color 0.2s;
        }
        .app-item:hover .app-title { 
            color: #fff; 
        }

        @keyframes fadeInHUD {
            from { opacity: 0; transform: translateY(15px); filter: blur(4px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
    </style>
</head>
<body>

    <canvas id="bg-particles"></canvas>

    <div class="main-container">
        <header>
            <div class="greeting">
                <h1 id="dyn-greeting">Hola, Matheo</h1>
                <p class="subtitle">THE ORIGIN · La vida está aquí.</p>
            </div>
            <div class="time-container">
                <div class="date-label" id="live-date">Cargando fecha...</div>
                <div class="time-badge" id="live-clock">00:00:00</div>
            </div>
        </header>

        <div class="stats-layout">
            <div class="stat-card xp-card">
                <div class="stat-icon">🔥</div>
                <div class="stat-info">
                    <span class="stat-label">XP (Experiencia)</span>
                    <div class="stat-val" id="display-xp">0</div>
                </div>
            </div>
            <div class="stat-card mp-card">
                <div class="stat-icon">⚡</div>
                <div class="stat-info">
                    <span class="stat-label">MP (MathePoints)</span>
                    <div class="stat-val" id="display-mp">0</div>
                </div>
            </div>
        </div>

        <div class="tabs-row">
            <button class="tab-btn active" onclick="filterMenu('all', this)">Todo</button>
            <button class="tab-btn" onclick="filterMenu('core', this)">Core</button>
            <button class="tab-btn" onclick="filterMenu('bio', this)">Bio-Perf</button>
            <button class="tab-btn" onclick="filterMenu('imp', this)">Imperio</button>
            <button class="tab-btn" onclick="filterMenu('utils', this)">Utils</button>
        </div>

        <main class="apps-grid" id="apps-container"></main>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playInterfaceSound(type) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'click') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.04, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'hover') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.01, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.04);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.04);
            }
        }

        const originApps = [
            { name: "Perfil", icon: "👤", cat: "core", url: "perfil.html" },
            { name: "Vault", icon: "🔒", cat: "core", url: "vault.html" },
            { name: "Settings", icon: "⚙️", cat: "core", url: "settings.html" },
            { name: "Passwords", icon: "🔑", cat: "core", url: "passwords.html" },
            
            { name: "Deporte", icon: "🏃‍♂️", cat: "bio", url: "deporte.html" },
            { name: "Cook", icon: "🍳", cat: "bio", url: "cook.html" },
            { name: "Health", icon: "❤️", cat: "bio", url: "health.html" },
            { name: "SLEEP", icon: "💤", cat: "bio", url: "sleep.html" },
            { name: "Pets", icon: "🐾", cat: "bio", url: "pets.html" },
            { name: "Meditation", icon: "🧘‍♂️", cat: "bio", url: "meditation.html" },
            { name: "Journal", icon: "📖", cat: "bio", url: "journal.html" },
            
            { name: "Business", icon: "💼", cat: "imp", url: "business.html" },
            { name: "Student", icon: "👨‍🎓", cat: "imp", url: "student.html" },
            { name: "Academy", icon: "🎓", cat: "imp", url: "academy.html" },
            { name: "Motivation", icon: "🔥", cat: "imp", url: "motivation.html" },
            { name: "Practique", icon: "🃏", cat: "imp", url: "practique.html" },
            { name: "Tasks", icon: "📋", cat: "imp", url: "tasks.html" },
            { name: "Habits", icon: "🔁", cat: "imp", url: "habits.html" },
            
            { name: "AI", icon: "🤖", cat: "utils", url: "ai.html" },
            { name: "Notes", icon: "📝", cat: "utils", url: "notes.html" },
            { name: "Time", icon: "⏳", cat: "utils", url: "time.html" },
            { name: "Point Shop", icon: "💎", cat: "utils", url: "pointshop.html" },
            { name: "Paint", icon: "🎨", cat: "utils", url: "paint.html" },
            { name: "Contacts", icon: "📇", cat: "utils", url: "contacts.html" },
            { name: "Maths", icon: "➗", cat: "utils", url: "maths.html" },
            { name: "Maps", icon: "📍", cat: "utils", url: "maps.html" },
            { name: "Docs", icon: "📂", cat: "utils", url: "docs.html" },
            { name: "Kids", icon: "🧸", cat: "utils", url: "kids.html" },
            { name: "Money", icon: "💸", cat: "utils", url: "money.html" },
            { name: "Music", icon: "🎧", cat: "utils", url: "music.html" }
        ];

        function loadPointsSystem() {
            if (localStorage.getItem('origin_xp') === null) localStorage.setItem('origin_xp', '0');
            if (localStorage.getItem('origin_mp') === null) localStorage.setItem('origin_mp', '0');
            document.getElementById('display-xp').innerText = localStorage.getItem('origin_xp');
            document.getElementById('display-mp').innerText = localStorage.getItem('origin_mp');
        }

        function renderApps(category = 'all') {
            const container = document.getElementById('apps-container');
            container.innerHTML = '';
            originApps.forEach(app => {
                if (category === 'all' || app.cat === category) {
                    const item = document.createElement('a');
                    item.href = app.url;
                    item.className = 'app-item';
                    item.setAttribute('onclick', "playInterfaceSound('click')");
                    item.setAttribute('onmouseenter', "playInterfaceSound('hover')");
                    
                    item.innerHTML = `
                        <div class="app-icon-wrapper">${app.icon}</div>
                        <span class="app-title">${app.name}</span>
                    `;
                    container.appendChild(item);
                }
            });
        }

        function filterMenu(módulo, button) {
            playInterfaceSound('click');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
            renderApps(módulo);
        }

        // CONTROL ACTUALIZADO DEL HUD (RELOJ + FECHA AUTOMÁTICA EN ESPAÑOL)
        function updateHUD() {
            const d = new Date();
            
            // Reloj
            document.getElementById('live-clock').innerText = d.toTimeString().split(' ')[0];
            
            // Fecha dinámica ("Viernes, 12 de Junio")
            const opciones = { weekday: 'long', day: 'numeric', month: 'long' };
            let fechaString = d.toLocaleDateString('es-ES', opciones);
            
            // Dar formato exacto: capitalizar primera letra de cada palabra clave
            fechaString = fechaString.replace(/(^\w|\s\w)/g, m => m.toUpperCase());
            // Reemplazar la "De" intermedia por "de" minúscula para que quede natural en español
            fechaString = fechaString.replace(/ De /g, ' de ');
            
            document.getElementById('live-date').innerText = fechaString;
            
            // Saludo dinámico por horas
            const h = d.getHours();
            let greet = "Hola, Matheo";
            if (h >= 6 && h < 12) greet = "Buenos días, Matheo";
            else if (h >= 12 && h < 20) greet = "Buenas tardes, Matheo";
            else greet = "Buenas noches, Matheo";
            document.getElementById('dyn-greeting').innerText = greet;
        }

        // MOTOR DE ESTRELLAS ANIMADO
        const canvas = document.getElementById('bg-particles');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedY = -(Math.random() * 0.2 + 0.05);
                this.alpha = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.y += this.speedY;
                if (this.y < 0) {
                    this.y = canvas.height;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 45; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }

        // INICIALIZACIÓN
        loadPointsSystem();
        renderApps();
        updateHUD();
        initParticles();
        animateParticles();
        setInterval(updateHUD, 1000); 
    </script>
</body>
</html>
