<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE ORIGIN - Terminal de Mando</title>
    <style>
        /* 1. CONFIGURACIÓN DEL SISTEMA Y ESTÉTICA CRT */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: radial-gradient(circle at center, #07140b 0%, #020503 100%);
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            padding: 15px;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* EFECTO LÍNEAS DE ESCÁNER (CRT) */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
            z-index: 9999;
            background-size: 100% 4px;
            pointer-events: none;
        }

        /* 2. HUD SUPERIOR (ESTADO Y CRÉDITOS) */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(0, 255, 102, 0.3);
            padding-bottom: 10px;
        }

        .sys-info { font-size: 0.7rem; line-height: 1.4; }
        .sys-info span { color: #fff; font-weight: bold; }

        .currency-hub { text-align: right; }
        #clock { font-size: 1.2rem; font-weight: bold; color: #fff; text-shadow: 0 0 10px #00ff66; }
        .credits { font-size: 0.8rem; color: #00ffff; margin-top: 5px; }

        /* 3. WIDGETS DE SIGNOS VITALES */
        .vitals-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .vital-bar { background: rgba(0,0,0,0.5); border: 1px solid #00ff6644; padding: 5px; border-radius: 5px; }
        .vital-label { font-size: 0.6rem; margin-bottom: 3px; display: block; }
        .bar-bg { height: 6px; background: #111; border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; box-shadow: 0 0 10px currentColor; transition: width 0.5s ease; }

        /* 4. MISIÓN ACTIVA */
        .active-quest {
            background: rgba(0, 255, 102, 0.05);
            border: 1px solid #00ff66;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 25px;
            box-shadow: inset 0 0 10px rgba(0, 255, 102, 0.1);
        }
        .quest-header { font-size: 0.65rem; color: #00aa44; font-weight: bold; margin-bottom: 5px; }
        .quest-title { font-size: 0.9rem; color: #fff; letter-spacing: 1px; }

        /* 5. FILTROS DE CATEGORÍA */
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        .filter-btn {
            background: transparent;
            border: 1px solid #00ff6666;
            color: #00ff66;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
            white-space: nowrap;
        }
        .filter-btn.active { background: #00ff66; color: #000; font-weight: bold; }

        /* 6. GRID DE APLICACIONES */
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
            padding-bottom: 50px;
        }

        .app-card {
            background: rgba(10, 25, 15, 0.4);
            border: 1px solid rgba(0, 255, 102, 0.2);
            border-radius: 12px;
            padding: 15px 5px;
            text-align: center;
            text-decoration: none;
            color: #00ff66;
            backdrop-filter: blur(5px);
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-card:hover { transform: translateY(-5px); border-color: #00ff66; background: rgba(0, 255, 102, 0.1); box-shadow: 0 0 15px rgba(0, 255, 102, 0.2); }
        .app-icon { font-size: 2rem; margin-bottom: 8px; }
        .app-name { font-size: 0.75rem; font-weight: bold; letter-spacing: 1px; }

        /* 7. TICKER INFERIOR (MENSAJES DEL SISTEMA) */
        footer {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: #000;
            border-top: 1px solid #00ff66;
            padding: 5px;
            overflow: hidden;
            white-space: nowrap;
        }
        .ticker { display: inline-block; animation: scrollText 20s linear infinite; font-size: 0.7rem; }

        @keyframes scrollText {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

    <header>
        <div class="sys-info">
            OP: <span>JUGADOR_LVL14</span><br>
            LINK: <span style="color:#00ffff">STABLE</span><br>
            LOC: <span>SECTOR_ORIGIN</span>
        </div>
        <div class="currency-hub">
            <div id="clock">00:00:00</div>
            <div class="credits">ORIGIN_CREDITS: 940 OC</div>
        </div>
    </header>

    <div class="vitals-container">
        <div class="vital-bar" style="color: #ff3333;">
            <span class="vital-label">HP (BIO)</span>
            <div class="bar-bg"><div class="bar-fill" style="width: 85%; background: #ff3333;"></div></div>
        </div>
        <div class="vital-bar" style="color: #00ffff;">
            <span class="vital-label">FOCUS (MP)</span>
            <div class="bar-bg"><div class="bar-fill" style="width: 60%; background: #00ffff;"></div></div>
        </div>
        <div class="vital-bar" style="color: #ffff00;">
            <span class="vital-label">BATTERY</span>
            <div class="bar-bg"><div class="bar-fill" id="bat-fill" style="width: 100%; background: #ffff00;"></div></div>
        </div>
    </div>

    <div class="active-quest">
        <div class="quest-header">▸ MISIÓN PRINCIPAL ACTIVA</div>
        <div class="quest-title">DOMINAR EL SISTEMA "THE ORIGIN"</div>
    </div>

    <div class="filters">
        <button class="filter-btn active" onclick="filterApps('all', this)">[ TODO ]</button>
        <button class="filter-btn" onclick="filterApps('core', this)">[ CORE ]</button>
        <button class="filter-btn" onclick="filterApps('bio', this)">[ BIO ]</button>
        <button class="filter-btn" onclick="filterApps('imp', this)">[ IMPERIO ]</button>
        <button class="filter-btn" onclick="filterApps('utils', this)">[ UTILS ]</button>
    </div>

    <main class="apps-grid" id="apps-grid">
        </main>

    <footer>
        <div class="ticker">▸ SISTEMA OPERATIVO THE ORIGIN ONLINE... TODOS LOS MÓDULOS SINCRONIZADOS... ESPERANDO ENTRADA DEL OPERADOR... MANTENTE ENFOCADO...</div>
    </footer>

    <script>
        const apps = [
            { name: "Perfil", icon: "👤", cat: "core", url: "perfil.html" },
            { name: "Vault", icon: "🔒", cat: "core", url: "vault.html" },
            { name: "Settings", icon: "⚙️", cat: "core", url: "settings.html" },
            { name: "Passwords", icon: "🔑", cat: "core", url: "passwords.html" },
            { name: "Deporte", icon: "🏃‍♂️", cat: "bio", url: "deporte.html" },
            { name: "Cook", icon: "🍳", cat: "bio", url: "cook.html" },
            { name: "Health", icon: "❤️", cat: "bio", url: "health.html" },
            { name: "SLEEP", icon: "💤", cat: "bio", url: "sleep.html" },
            { name: "Pets", icon: "🐾", cat: "bio", url: "pets.html" },
            { name: "Meditation", icon: "🧘‍♂️", cat: "bio", url: "meditation.html" },
            { name: "Journal", icon: "📖", cat: "bio", url: "journal.html" },
            { name: "Business", icon: "💼", cat: "imp", url: "business.html" },
            { name: "Student", icon: "👨‍🎓", cat: "imp", url: "student.html" },
            { name: "Academy", icon: "🎓", cat: "imp", url: "academy.html" },
            { name: "Motivation", icon: "🔥", cat: "imp", url: "motivation.html" },
            { name: "Practique", icon: "🃏", cat: "imp", url: "practique.html" },
            { name: "Tasks", icon: "📋", cat: "imp", url: "tasks.html" },
            { name: "Habits", icon: "🔁", cat: "imp", url: "habits.html" },
            { name: "AI", icon: "🤖", cat: "utils", url: "ai.html" },
            { name: "Notes", icon: "📝", cat: "utils", url: "notes.html" },
            { name: "Time", icon: "⏳", cat: "utils", url: "time.html" },
            { name: "Point Shop", icon: "💎", cat: "utils", url: "pointshop.html" },
            { name: "Paint", icon: "🎨", cat: "utils", url: "paint.html" },
            { name: "Contacts", icon: "📇", cat: "utils", url: "contacts.html" },
            { name: "Maths", icon: "➗", cat: "utils", url: "maths.html" },
            { name: "Maps", icon: "📍", cat: "utils", url: "maps.html" },
            { name: "Docs", icon: "📂", cat: "utils", url: "docs.html" },
            { name: "Kids", icon: "🧸", cat: "utils", url: "kids.html" },
            { name: "Money", icon: "💸", cat: "utils", url: "money.html" },
            { name: "Music", icon: "🎧", cat: "utils", url: "music.html" }
        ];

        // RENDERIZAR APPS
        function renderApps(filter = 'all') {
            const grid = document.getElementById('apps-grid');
            grid.innerHTML = '';
            apps.forEach(app => {
                if (filter === 'all' || app.cat === filter) {
                    const card = document.createElement('a');
                    card.href = app.url;
                    card.className = 'app-card';
                    card.onclick = (e) => playSound(e, app.url);
                    card.innerHTML = `<div class="app-icon">${app.icon}</div><div class="app-name">${app.name}</div>`;
                    grid.appendChild(card);
                }
            });
        }

        function filterApps(cat, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderApps(cat);
            playSysSound(600, 0.05);
        }

        // RELOJ
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
        }
        setInterval(updateClock, 1000);

        // AUDIO
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSysSound(freq, dur) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        function playSound(e, url) {
            e.preventDefault();
            playSysSound(880, 0.08);
            setTimeout(() => window.location.href = url, 100);
        }

        // BATERÍA REAL
        navigator.getBattery().then(bat => {
            const updateBat = () => document.getElementById('bat-fill').style.width = (bat.level * 100) + '%';
            bat.onlevelchange = updateBat; updateBat();
        });

        renderApps();
        updateClock();
    </script>
</body>
</html>
