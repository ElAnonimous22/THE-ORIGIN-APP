<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE ORIGIN - Dashboard Pro</title>
    <style>
        /* 1. VARIABLES DE ESTILO PREMIUM (GLASSMORPHISM EXTENDIDO) */
        :root {
            --bg-main: #060614; 
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.06);
            --glass-hover: rgba(255, 255, 255, 0.10);
            --accent-purple: #c084fc; 
            --accent-cyan: #22d3ee;   
            --accent-orange: #f97316;
            --accent-neon-glow: rgba(34, 211, 238, 0.3);
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --anim-space: cubic-bezier(0.25, 1, 0.5, 1);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        body {
            background-color: var(--bg-main);
            background-image:  
                radial-gradient(circle at 85% 15%, rgba(192, 132, 252, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 15% 85%, rgba(34, 211, 238, 0.08) 0%, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 24px 20px 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* LIENZO DE PARTÍCULAS / ESTRELLAS DE FONDO */
        #bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        .main-container {
            width: 100%;
            max-width: 1200px; 
            display: flex;
            flex-direction: column;
            gap: 24px;
            animation: fadeInHUD 0.8s var(--anim-space);
        }

        /* 2. CABECERA CON SALUDO, RELOJ Y ANIMACIÓN DE ENTRADA */
        header {
            display: flex;
            flex-direction: column; 
            justify-content: space-between;
            align-items: flex-start;
            gap: 15px;
            margin-top: 10px;
            width: 100%;
        }

        @media (min-width: 768px) {
            header {
                flex-direction: row; 
                align-items: center;
            }
        }

        .greeting h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.7px;
            background: linear-gradient(135deg, #ffffff 30%, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .greeting .subtitle {
            font-size: 0.95rem;
            color: var(--accent-purple); 
            font-weight: 600;
            margin-top: 5px;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(192, 132, 252, 0.4);
        }

        /* CONTENEDOR DEL RELOJ Y LA FECHA */
        .time-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
        }

        @media (min-width: 768px) {
            .time-container {
                align-items: flex-end;
            }
        }

        .date-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            color: var(--accent-purple);
            text-shadow: 0 0 8px rgba(192, 132, 252, 0.3);
            padding-right: 4px;
        }

        .time-badge {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 12px 22px;
            border-radius: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            font-weight: 700;
            font-size: 1.2rem;
            color: #fff;
            letter-spacing: 1px;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.1), 0 10px 25px rgba(0,0,0,0.4);
            font-variant-numeric: tabular-nums; 
            transition: border-color 0.3s;
        }
        .time-badge:hover {
            border-color: var(--accent-cyan);
        }

        /* 3. PANEL DE STATS AJUSTADO A 3 COLUMNAS CON LA RACHA */
        .stats-layout {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 14px;
        }

        @media (min-width: 550px) {
            .stats-layout {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .stat-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            transition: transform 0.3s var(--anim-space), border-color 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255,255,255,0.15);
        }

        .stat-icon { 
            font-size: 1.6rem; 
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.2));
        }
        .stat-info .stat-label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 700; }
        .stat-info .stat-val { font-size: 1.3rem; font-weight: 800; color: #fff; margin-top: 2px; }

        .xp-card {
            border-color: rgba(192, 132, 252, 0.15);
        }
        .xp-card .stat-val {
            color: var(--accent-purple);
            text-shadow: 0 0 12px rgba(192, 132, 252, 0.3);
        }

        .mp-card {
            background: linear-gradient(135deg, rgba(34, 211, 238, 0.05), rgba(255, 255, 255, 0.005));
            border-color: rgba(34, 211, 238, 0.2);
        }
        .mp-card .stat-val { 
            color: var(--accent-cyan); 
            text-shadow: 0 0 12px rgba(34, 211, 238, 0.4);
        }

        .racha-card {
            border-color: rgba(249, 115, 22, 0.2);
            background: linear-gradient(135deg, rgba(249, 115, 22, 0.03), rgba(255, 255, 255, 0.002));
        }
        .racha-card .stat-val {
            color: var(--accent-orange);
            text-shadow: 0 0 12px rgba(249, 115, 22, 0.4);
        }

        /* 4. TABS FILTROS DISEÑO ELÁSTICO */
        .tabs-row {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 6px;
            width: 100%;
        }
        .tabs-row::-webkit-scrollbar { display: none; }

        .tab-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: #94a3b8;
            padding: 12px 24px;
            border-radius: 16px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.25s var(--anim-space);
        }

        .tab-btn:hover {
            color: #fff;
            background: var(--glass-hover);
            border-color: rgba(255,255,255,0.2);
        }

        .tab-btn.active {
            background: #ffffff;
            color: #060614;
            border-color: #ffffff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2), 0 4px 12px rgba(0,0,0,0.3);
            transform: scale(1.02);
        }

        /* 5. REJILLA DE APPS GAMER PREMIUM MODIFICADA PARA DESCRIPCIONES */
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            row-gap: 24px;
            column-gap: 16px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 24px;
            border-radius: 28px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.02), 0 15px 35px rgba(0,0,0,0.3);
        }

        @media (min-width: 480px) { .apps-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 700px) { .apps-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (min-width: 950px) { .apps-grid { grid-template-columns: repeat(5, 1fr); } }
        @media (min-width: 1200px) { .apps-grid { grid-template-columns: repeat(6, 1fr); } }

        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            gap: 8px;
            padding: 10px 6px;
            border-radius: 18px;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.2s ease;
        }

        .app-item:active { transform: scale(0.92); }
        .app-item:hover { background: rgba(255,255,255,0.01); }

        .app-icon-wrapper {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.7rem;
            box-shadow: 0 6px 16px rgba(0,0,0,0.2);
            transition: all 0.3s var(--anim-space);
            position: relative;
        }

        .app-item:hover .app-icon-wrapper {
            border-color: var(--accent-cyan);
            background: var(--glass-hover);
            transform: translateY(-4px);
            box-shadow: 0 0 20px var(--accent-neon-glow), 0 8px 20px rgba(0,0,0,0.4);
        }

        .app-text-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            gap: 3px;
        }

        .app-title {
            font-size: 0.82rem;
            color: #94a3b8;
            font-weight: 700;
            text-align: center;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: color 0.2s;
        }
        
        .app-desc {
            font-size: 0.68rem;
            color: var(--text-muted);
            text-align: center;
            width: 100%;
            max-width: 130px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 500;
            transition: color 0.2s;
        }

        .app-item:hover .app-title { color: #fff; }
        .app-item:hover .app-desc { color: #94a3b8; }

        /* ========================================================
           6. NUEVO ESTILO: REPRODUCTOR DE MÚSICA PHONK PREMIUM
           ======================================================== */
        .phonk-player-card {
            background: linear-gradient(135deg, rgba(192, 132, 252, 0.03), rgba(34, 211, 238, 0.02));
            border: 1px solid rgba(192, 132, 252, 0.15);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            width: 100%;
            transition: border-color 0.4s var(--anim-space);
        }
        .phonk-player-card:hover {
            border-color: var(--accent-cyan);
        }

        .player-body {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        .track-info-block {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .vinyl-art {
            width: 52px;
            height: 52px;
            background: radial-gradient(circle, #22d3ee 10%, #060614 40%, #1e1b4b 100%);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.2);
            transition: transform 0.5s linear;
        }
        .vinyl-art.playing {
            animation: spinVinyl 3s linear infinite;
            border-color: var(--accent-cyan);
        }

        .track-text {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .track-title {
            font-size: 0.95rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.3px;
        }
        .track-genre {
            font-size: 0.7rem;
            color: var(--accent-purple);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* CONTROLES */
        .player-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .control-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: #fff;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.25s var(--anim-space);
        }
        .control-btn:hover {
            background: #fff;
            color: #060614;
            transform: scale(1.05);
        }
        .control-btn.play-btn {
            background: var(--accent-purple);
            border-color: var(--accent-purple);
            box-shadow: 0 0 15px rgba(192, 132, 252, 0.4);
        }
        .control-btn.play-btn:hover {
            background: var(--accent-cyan);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.5);
            color: #060614;
        }

        /* VISUALIZADOR DE ONDAS AUDIO */
        .visualizer-container {
            flex-grow: 1;
            min-width: 150px;
            height: 40px;
            display: flex;
            align-items: center;
        }
        #audio-visualizer {
            width: 100%;
            height: 100%;
            border-radius: 8px;
        }

        @keyframes spinVinyl {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes fadeInHUD {
            from { opacity: 0; transform: translateY(15px); filter: blur(4px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
    </style>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playInterfaceSound(type) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'click') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.04, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'hover') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.01, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.04);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.04);
            }
        }

        // LOGICA DE RECONEXIÓN E INYECCIÓN DE DATOS REALES CORREGIDA
        function loadPointsSystem() {
            // Comprobación cruzada de llaves para evitar desincronizaciones entre archivos
            const realXP = localStorage.getItem('origin_xp') || localStorage.getItem('xp') || '0';
            const realMP = localStorage.getItem('origin_mp') || localStorage.getItem('mp') || '0';
            const realRacha = localStorage.getItem('origin_racha') || localStorage.getItem('racha') || '1';

            // Asegurar la consistencia del storage guardando la llave del menú por si acaso
            localStorage.setItem('origin_xp', realXP);
            localStorage.setItem('origin_mp', realMP);
            localStorage.setItem('origin_racha', realRacha);
            
            // Pintar los datos reales sin demoras
            document.getElementById('display-xp').innerText = realXP;
            document.getElementById('display-mp').innerText = realMP;
            document.getElementById('display-racha').innerText = realRacha + (realRacha == 1 ? ' día' : ' días');
        }

        function renderApps(category = 'all') {
            const container = document.getElementById('apps-container');
            container.innerHTML = '';
            let totalModulos = 0;

            originApps.forEach(app => {
                if (category === 'all' || app.cat === category) {
                    totalModulos++;
                    const item = document.createElement('a');
                    item.href = app.url;
                    item.className = 'app-item';
                    item.setAttribute('onclick', "playInterfaceSound('click')");
                    item.setAttribute('onmouseenter', "playInterfaceSound('hover')");
                    
                    item.innerHTML = `
                        <div class="app-icon-wrapper">${app.icon}</div>
                        <div class="app-text-block">
                            <span class="app-title">${app.name}</span>
                            <span class="app-desc">${app.desc}</span>
                        </div>
                    `;
                    container.appendChild(item);
                }
            });
            // Mantiene actualizado el contador inferior dinámicamente si usas filtros
            document.getElementById('app-counter').innerText = totalModulos;
        }

        function filterMenu(módulo, button) {
            playInterfaceSound('click');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
            renderApps(módulo);
        }

        function updateHUD() {
            const d = new Date();
            document.getElementById('live-clock').innerText = d.toTimeString().split(' ')[0];
            
            const opciones = { weekday: 'long', day: 'numeric', month: 'long' };
            let fechaString = d.toLocaleDateString('es-ES', opciones);
            
            fechaString = fechaString.replace(/(^\w|\s\w)/g, m => m.toUpperCase());
            fechaString = fechaString.replace(/ De /g, ' de ');
            
            document.getElementById('live-date').innerText = fechaString;
            
            const h = d.getHours();
            let greet = "Hola, Matheo";
            if (h >= 6 && h < 12) greet = "Buenos días, Matheo";
            else if (h >= 12 && h < 20) greet = "Buenas tardes, Matheo";
            else greet = "Buenas noches, Matheo";
            document.getElementById('dyn-greeting').innerText = greet;
        }

        // MOTOR DE ESTRELLAS ANIMADO
        const canvas = document.getElementById('bg-particles');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedY = -(Math.random() * 0.2 + 0.05);
                this.alpha = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.y += this.speedY;
                if (this.y < 0) {
                    this.y = canvas.height;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 45; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }

        // ========================================================
        // MOTOR DE LOGICA Y SINTETIZADOR SÓNICO PHONK 
        // ========================================================
        const phonkTracks = [
            { title: "DRIFT HELL SOUL", author: "PROD. BY ORIGIN" },
            { title: "NEON GLOW RIDER", author: "LXST CENTURY STYLE" },
            { title: "KILLER TRACK V8", author: "KORDHELL INSPIRED" }
        ];
        let currentTrackIdx = 0;
        let isMusicPlaying = false;
        let soundInterval = null;
        let visualizerAnalyser = null;
        let canvasVis, ctxVis;
        let mockWaveData = [];

        function initVisualizer() {
            canvasVis = document.getElementById('audio-visualizer');
            ctxVis = canvasVis.getContext('2d');
            canvasVis.width = canvasVis.parentElement.clientWidth;
            canvasVis.height = 40;
            
            // Generar barras simuladas en reposo
            mockWaveData = [];
            for(let i = 0; i < canvasVis.width; i += 7) {
                mockWaveData.push(4);
            }
            drawVisualizer();
        }

        function drawVisualizer() {
            ctxVis.clearRect(0, 0, canvasVis.width, canvasVis.height);
            ctxVis.fillStyle = isMusicPlaying ? "rgba(34, 211, 238, 0.6)" : "rgba(100, 116, 139, 0.3)";
            
            mockWaveData.forEach((val, idx) => {
                const x = idx * 7;
                const h = val;
                const y = (canvasVis.height - h) / 2;
                ctxVis.fillRect(x, y, 4, h);
            });
        }

        function animateVisualizer() {
            if (!isMusicPlaying) return;
            mockWaveData = mockWaveData.map(() => Math.floor(Math.random() * 30) + 4);
            drawVisualizer();
            requestAnimationFrame(animateVisualizer);
        }

        function toggleMusic() {
            playInterfaceSound('click');
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const btnPlay = document.getElementById('btn-play');
            const vinyl = document.getElementById('player-vinyl');

            if (!isMusicPlaying) {
                isMusicPlaying = true;
                btnPlay.innerText = "⏸";
                vinyl.classList.add('playing');
                startPhonkSequencer();
                animateVisualizer();
            } else {
                isMusicPlaying = false;
                btnPlay.innerText = "▶";
                vinyl.classList.remove('playing');
                clearInterval(soundInterval);
                initVisualizer();
            }
        }

        function changeTrack(direction) {
            playInterfaceSound('click');
            currentTrackIdx = (currentTrackIdx + direction + phonkTracks.length) % phonkTracks.length;
            document.getElementById('track-title').innerText = phonkTracks[currentTrackIdx].title;
            document.getElementById('track-author').innerText = phonkTracks[currentTrackIdx].author;
            
            if (isMusicPlaying) {
                clearInterval(soundInterval);
                startPhonkSequencer();
            }
        }

        function startPhonkSequencer() {
            let beatCount = 0;
            // Ritmo procedural simulado del secuenciador Phonk
            soundInterval = setInterval(() => {
                if (audioCtx.state === 'suspended') return;
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                // Bombo / Kick profundo en cada beat de Phonk
                if (beatCount % 2 === 0) {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(120, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(45, audioCtx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.18);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.18);
                } 
                // Platillo o Bajo distorsionado intercalado
                else {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(currentTrackIdx === 1 ? 70 : 60, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.12);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.12);
                }
                beatCount++;
            }, 300);
        }

        // INICIALIZACIÓN GENERAL DEL DASHBOARD
        loadPointsSystem();
        renderApps();
        updateHUD();
        initParticles();
        animateParticles();
        initVisualizer();

        setInterval(updateHUD, 1000);
    </script>
</body>
</html>
