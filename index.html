<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE ORIGIN - Sistema Central</title>
    <style>
        /* CONFIGURACIÓN GENERAL REUTILIZADA DEL MENÚ */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #050806;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* FONDO DE LÍNEAS MATRICIALES / REJILLA DEL MENÚ PRINCIPAL */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(rgba(0, 255, 102, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 102, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: 1;
            pointer-events: none;
        }

        /* EFECTO CRT GLOBAL */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
            z-index: 9999;
            background-size: 100% 4px;
            pointer-events: none;
        }

        /* INTERFAZ DE ARRANQUE (BOOT LOG) */
        #boot-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #020403;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 30px;
            font-size: 1rem;
            letter-spacing: 1px;
            overflow: hidden;
        }

        .boot-line {
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            animation: typing 0.4s steps(40, end) forwards;
        }

        /* CONTENEDOR PRINCIPAL CON EL DISEÑO DE PANEL DEL MENÚ (TERMINAL BRUTALISTA) */
        .main-interface {
            position: relative;
            z-index: 5;
            display: none;
            width: 100%;
            max-width: 400px;
            background: rgba(10, 16, 12, 0.92);
            border: 2px solid #00ff66;
            padding: 35px 25px;
            box-shadow: 0 0 25px rgba(0, 255, 102, 0.15);
            animation: fadeIn 0.5s ease forwards;
        }

        /* CABECERA ESTILO PANEL DE CONTROL */
        .panel-header {
            border-bottom: 2px solid #00ff66;
            padding-bottom: 15px;
            margin-bottom: 25px;
            text-align: left;
        }

        h1 {
            font-size: 2.2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #00ff66;
            font-weight: 900;
        }

        .subtitle {
            font-size: 0.75rem;
            color: #00aa44;
            margin-top: 5px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* CASILLAS DE CÓDIGO - DISEÑO RETRO ILUMINADO */
        .code-container {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 30px;
        }

        .code-slot {
            width: 50px;
            height: 60px;
            background: #040705;
            border: 1px solid rgba(0, 255, 102, 0.3);
            font-size: 2rem;
            font-weight: bold;
            color: #00ff66;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s ease;
        }

        .code-slot.active {
            border-color: #00ff66;
            background: rgba(0, 255, 102, 0.05);
            box-shadow: inset 0 0 10px rgba(0, 255, 102, 0.2);
        }

        /* TECLADO CON DISEÑO CUADRADO DEL MENÚ */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
        }

        .key {
            width: 100%;
            height: 60px;
            background: #0d140f;
            border: 1px solid #00ff66;
            color: #00ff66;
            font-size: 1.6rem;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .key:hover {
            background: #00ff66;
            color: #000;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
        }

        .key:active {
            transform: scale(0.96);
        }

        /* BOTÓN DE BORRADO */
        .key.clear {
            border-color: #ff3333;
            color: #ff3333;
            background: rgba(20, 10, 10, 0.5);
        }
        .key.clear:hover {
            background: #ff3333;
            color: #000;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.4);
        }

        /* MENSAJES DE ESTADO DE AUTORIZACIÓN */
        .status-message {
            margin-top: 25px;
            font-size: 0.85rem;
            height: 20px;
            font-weight: bold;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-align: left;
        }

        .success { color: #00ff66; }
        .error { color: #ff3333; }

        /* ANIMACIÓN DE ERROR SÍSMICO */
        .shake {
            animation: shakeAnim 0.3s ease-in-out;
            border-color: #ff3333 !important;
            box-shadow: 0 0 30px rgba(255, 51, 51, 0.3) !important;
        }

        /* KEYFRAMES */
        @keyframes typing { from { width: 0; } to { width: 100%; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
    </style>
</head>
<body>

    <div id="boot-screen"></div>

    <div class="main-interface" id="terminal">
        <div class="panel-header">
            <h1>THE ORIGIN</h1>
            <div class="subtitle">SISTEMA CENTRAL // LOGIN_REQ</div>
        </div>
        
        <div class="code-container">
            <div class="code-slot" id="slot0"></div>
            <div class="code-slot" id="slot1"></div>
            <div class="code-slot" id="slot2"></div>
            <div class="code-slot" id="slot3"></div>
            <div class="code-slot" id="slot4"></div>
            <div class="code-slot" id="slot5"></div>
        </div>

        <div class="keypad">
            <button class="key" onclick="pressKey('1')">1</button>
            <button class="key" onclick="pressKey('2')">2</button>
            <button class="key" onclick="pressKey('3')">3</button>
            <button class="key" onclick="pressKey('4')">4</button>
            <button class="key" onclick="pressKey('5')">5</button>
            <button class="key" onclick="pressKey('6')">6</button>
            <button class="key" onclick="pressKey('7')">7</button>
            <button class="key" onclick="pressKey('8')">8</button>
            <button class="key" onclick="pressKey('9')">9</button>
            <button class="key clear" onclick="clearCode()">C</button>
            <button class="key" onclick="pressKey('0')">0</button>
        </div>

        <div class="status-message" id="status"></div>
    </div>

    <script>
        const CORRECT_CODE = "010822";
        let currentInput = "";
        let isLocked = false;

        // AUDIO SINTETIZADO MONOCROMÁTICO
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration, vol = 0.06) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e){}
        }

        // SECUENCIA LOGS DE ARRANQUE TRADICIONAL
        const logs = [
            "Initializing ORIGIN_CORE v1.14...",
            "Loading terminal design layouts...",
            "Connecting database modules [Perfil, Hábitos, Deporte, AI]...",
            "Syncing terminal styling parameters...",
            "Applying system firewall... OK",
            "THE ORIGIN OS ready for terminal authorization."
        ];
        
        const bootScreen = document.getElementById("boot-screen");
        let logIndex = 0;

        function printLog() {
            if (logIndex < logs.length) {
                const line = document.createElement("div");
                line.className = "boot-line";
                line.innerText = `▸ ${logs[logIndex]}`;
                bootScreen.appendChild(line);
                playTone(450 + (logIndex * 50), 'sine', 0.03, 0.02);
                logIndex++;
                setTimeout(printLog, 300);
            } else {
                setTimeout(() => {
                    bootScreen.style.display = "none";
                    document.getElementById("terminal").style.display = "block";
                    playTone(900, 'sine', 0.12, 0.05);
                }, 500);
            }
        }
        window.addEventListener('load', printLog);

        // RENDERIZADO VISIBLE DE LOS NÚMEROS ESCRITOS
        function updateDisplay() {
            for (let i = 0; i < 6; i++) {
                const slot = document.getElementById(`slot${i}`);
                if (i < currentInput.length) {
                    slot.innerText = currentInput[i]; 
                    slot.classList.add("active");
                } else {
                    slot.innerText = "";
                    slot.classList.remove("active");
                }
            }
        }

        function pressKey(num) {
            if (currentInput.length < 6 && !isLocked) {
                currentInput += num;
                playTone(850, 'sine', 0.04);
                updateDisplay();
                if (currentInput.length === 6) checkCode();
            }
        }

        function clearCode() {
            if (!isLocked) {
                currentInput = "";
                playTone(250, 'triangle', 0.08);
                document.getElementById("status").innerText = "";
                updateDisplay();
            }
        }

        // CAPTURA DE TECLADO FÍSICO
        document.addEventListener('keydown', (e) => {
            if (bootScreen.style.display !== "none") return;
            if (/^[0-9]$/.test(e.key)) pressKey(e.key);
            else if (e.key === 'Backspace' || e.key.toLowerCase() === 'c') clearCode();
        });

        // VALIDACIÓN DE ACCESO TERMINAL
        function checkCode() {
            const status = document.getElementById("status");
            const terminal = document.getElementById("terminal");
            isLocked = true;

            if (currentInput === CORRECT_CODE) {
                status.className = "status-message success";
                status.innerText = "▸ ACCESS GRANTED // EXEC_OS_INJECTION";
                playTone(600, 'sine', 0.08);
                setTimeout(() => playTone(800, 'sine', 0.12), 90);

                setTimeout(() => {
                    window.location.href = "menuprincipal.html";
                }, 1200);
            } else {
                status.className = "status-message error";
                status.innerText = "▸ ACCESS DENIED // CORRUPT_CREDENTIALS";
                terminal.classList.add("shake");
                playTone(120, 'sawtooth', 0.35, 0.12);

                setTimeout(() => {
                    terminal.classList.remove("shake");
                    isLocked = false;
                    clearCode();
                }, 1200);
            }
        }
    </script>
</body>
</html>
