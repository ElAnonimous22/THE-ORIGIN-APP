<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE ORIGIN APP - Acceso</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 10px;
            background: radial-gradient(circle, #0c1a10 0%, #020503 100%);
            color: #00ff66; 
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* EFECTO PANTALLA CRT / ESCÁNER EN TODA LA WEB */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 9999;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        /* CONTENEDOR TIPO TERMINAL MILITAR */
        .login-container {
            text-align: center;
            background: rgba(5, 15, 8, 0.85);
            padding: 30px 20px;
            border: 2px solid #00ff66;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.3), inset 0 0 15px rgba(0, 255, 102, 0.1);
            width: 100%;
            max-width: 360px;
            backdrop-filter: blur(8px);
            transition: transform 0.2s ease;
        }

        /* ANIMACIÓN DE ERROR (VIBRACIÓN) */
        .shake {
            animation: shakeAnim 0.4s ease-in-out;
            border-color: #ff3333 !important;
            box-shadow: 0 0 30px rgba(255, 51, 51, 0.5) !important;
        }

        h1 {
            font-size: 2rem;
            margin: 0 0 5px 0;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 8px #00ff66, 0 0 20px #00ff66;
        }

        .subtitle {
            font-size: 0.8rem;
            color: #00aa44;
            font-weight: bold;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        /* DISPLAY DE CÓDIGO CON GLOW BLANCO */
        .code-display {
            font-size: 2.5rem;
            letter-spacing: 12px;
            margin-bottom: 25px;
            height: 50px;
            color: #fff;
            text-shadow: 0 0 15px #00ff66;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 6px;
            border: 1px dashed rgba(0, 255, 102, 0.3);
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
        }

        /* BOTONES CON EFECTO CRISTAL DE NEÓN */
        .key {
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: 75px;
            margin: 0 auto;
            background: rgba(10, 30, 15, 0.6);
            border: 1px solid #00ff66;
            color: #00ff66;
            font-size: 1.8rem;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.1), inset 0 0 8px rgba(0, 255, 102, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .key:hover {
            background: rgba(0, 255, 102, 0.15);
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
        }

        .key:active {
            background: #00ff66;
            color: #000;
            box-shadow: 0 0 25px #00ff66;
            transform: scale(0.9);
        }

        .key.clear {
            border-color: #ff3333;
            color: #ff3333;
            background: rgba(30, 10, 10, 0.6);
            box-shadow: 0 0 10px rgba(255, 51, 51, 0.1), inset 0 0 8px rgba(255, 51, 51, 0.2);
        }
        .key.clear:hover {
            background: rgba(255, 51, 51, 0.15);
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.4);
        }
        .key.clear:active {
            background: #ff3333;
            color: #000;
            box-shadow: 0 0 25px #ff3333;
        }

        .status-message {
            margin-top: 20px;
            font-size: 0.95rem;
            height: 20px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .success { color: #00ff66; text-shadow: 0 0 8px #00ff66; }
        .error { color: #ff3333; text-shadow: 0 0 8px #ff3333; }

        /* ANIMACIÓN SHAKE */
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-12px); }
            40%, 80% { transform: translateX(12px); }
        }
    </style>
</head>
<body>

    <div class="login-container" id="terminal">
        <h1>THE ORIGIN APP</h1>
        <div class="subtitle">SECURE INTERFACE v1.14</div>
        
        <div class="code-display" id="display">______</div>

        <div class="keypad">
            <button class="key" onclick="pressKey('1')">1</button>
            <button class="key" onclick="pressKey('2')">2</button>
            <button class="key" onclick="pressKey('3')">3</button>
            <button class="key" onclick="pressKey('4')">4</button>
            <button class="key" onclick="pressKey('5')">5</button>
            <button class="key" onclick="pressKey('6')">6</button>
            <button class="key" onclick="pressKey('7')">7</button>
            <button class="key" onclick="pressKey('8')">8</button>
            <button class="key" onclick="pressKey('9')">9</button>
            <button class="key clear" onclick="clearCode()">C</button>
            <button class="key" onclick="pressKey('0')">0</button>
        </div>

        <div class="status-message" id="status"></div>
    </div>

    <script>
        const CORRECT_CODE = "010822";
        let currentInput = "";
        let isLocked = false;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(frequency, type, duration) {
            try {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = type;
                oscillator.frequency.value = frequency;
                gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            } catch (e) {}
        }

        function updateDisplay() {
            const display = document.getElementById("display");
            display.innerText = currentInput.padEnd(6, "_");
        }

        function pressKey(num) {
            if (currentInput.length < 6 && !isLocked) {
                currentInput += num;
                playSound(700, 'sine', 0.04);
                updateDisplay();

                if (currentInput.length === 6) {
                    checkCode();
                }
            }
        }

        function clearCode() {
            if (!isLocked) {
                currentInput = "";
                playSound(250, 'triangle', 0.08);
                document.getElementById("status").innerText = "";
                updateDisplay();
            }
        }

        document.addEventListener('keydown', (event) => {
            const key = event.key;
            if (/^[0-9]$/.test(key)) pressKey(key);
            else if (key === 'Backspace' || key.toLowerCase() === 'c') clearCode();
        });

        function checkCode() {
            const statusMessage = document.getElementById("status");
            const terminal = document.getElementById("terminal");
            isLocked = true;
            
            if (currentInput === CORRECT_CODE) {
                statusMessage.className = "status-message success";
                statusMessage.innerText = "▸ DECRYPT OVER: ACCESS GRANTED";
                playSound(600, 'sine', 0.08); 
                setTimeout(() => playSound(900, 'sine', 0.15), 800); 
                
                setTimeout(() => {
                    window.location.href = "menuprincipal.html";
                }, 1200);

            } else {
                statusMessage.className = "status-message error";
                statusMessage.innerText = "▸ ERROR: ACCESS DENIED";
                terminal.classList.add("shake");
                playSound(120, 'sawtooth', 0.35);
                
                setTimeout(() => {
                    terminal.classList.remove("shake");
                    isLocked = false;
                    clearCode();
                }, 1200);
            }
        }
    </script>
</body>
</html>
