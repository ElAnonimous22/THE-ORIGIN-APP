<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ORIGIN APP - Acceso</title>
    <style>
        /* ESTILO FUTURISTA / CYBERPUNK */
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: #00ff66; /* Verde Matrix */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .login-container {
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border: 2px solid #00ff66;
            border-radius: 10px;
            box-shadow: 0 0 20px #00ff66;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: glitch 2s infinite;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 25px;
        }

        /* Pantalla que muestra los dígitos */
        .code-display {
            font-size: 2rem;
            letter-spacing: 10px;
            margin-bottom: 20px;
            height: 40px;
            color: #fff;
            text-shadow: 0 0 10px #00ff66;
        }

        /* Teclado numérico */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 80px);
            gap: 15px;
            justify-content: center;
        }

        .key {
            width: 80px;
            height: 80px;
            background: #111;
            border: 1px solid #00ff66;
            color: #00ff66;
            font-size: 1.5rem;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: inset 0 0 5px #00ff66;
        }

        .key:active {
            background: #00ff66;
            color: #000;
            box-shadow: 0 0 15px #00ff66;
            transform: scale(0.95);
        }

        .key.clear {
            border-color: #ff3333;
            color: #ff3333;
            box-shadow: inset 0 0 5px #ff3333;
        }
        .key.clear:active {
            background: #ff3333;
            color: #000;
            box-shadow: 0 0 15px #ff3333;
        }

        /* Mensajes de estado */
        .status-message {
            margin-top: 20px;
            font-size: 1.1rem;
            height: 20px;
            font-weight: bold;
        }

        .success { color: #00ff66; }
        .error { color: #ff3333; }

        /* Efecto de parpadeo para el título */
        @keyframes glitch {
            0% { opacity: 1; }
            50% { opacity: 0.8; text-shadow: 0 0 10px #00ff66; }
            55% { opacity: 0.2; }
            60% { opacity: 1; text-shadow: 0 0 20px #00ff66; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>THE ORIGIN APP</h1>
        <div class="subtitle">SISTEMA OPERATIVO PERSONAL v1.14</div>
        
        <div class="code-display" id="display">______</div>

        <div class="keypad">
            <button class="key" onclick="pressKey('1')">1</button>
            <button class="key" onclick="pressKey('2')">2</button>
            <button class="key" onclick="pressKey('3')">3</button>
            <button class="key" onclick="pressKey('4')">4</button>
            <button class="key" onclick="pressKey('5')">5</button>
            <button class="key" onclick="pressKey('6')">6</button>
            <button class="key" onclick="pressKey('7')">7</button>
            <button class="key" onclick="pressKey('8')">8</button>
            <button class="key" onclick="pressKey('9')">9</button>
            <button class="key" onclick="clearCode()">C</button>
            <button class="key" onclick="pressKey('0')">0</button>
        </div>

        <div class="status-message" id="status"></div>
    </div>

    <script>
        const CORRECT_CODE = "010822";
        let currentInput = "";

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(frequency, type, duration) {
            try {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.type = type;
                oscillator.frequency.value = frequency;
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            } catch (e) {
                console.log("Audio activado tras la primera interacción");
            }
        }

        function updateDisplay() {
            const display = document.getElementById("display");
            display.innerText = currentInput.padEnd(6, "_");
        }

        function pressKey(num) {
            if (currentInput.length < 6) {
                currentInput += num;
                playSound(600, 'sine', 0.05);
                updateDisplay();

                if (currentInput.length === 6) {
                    checkCode();
                }
            }
        }

        function clearCode() {
            currentInput = "";
            playSound(300, 'triangle', 0.1);
            document.getElementById("status").innerText = "";
            updateDisplay();
        }

        function checkCode() {
            const statusMessage = document.getElementById("status");
            
            if (currentInput === CORRECT_CODE) {
                statusMessage.className = "status-message success";
                statusMessage.innerText = "ACCESO CONCEDIDO. CARGANDO...";
                playSound(523.25, 'sine', 0.1); 
                setTimeout(() => playSound(659.25, 'sine', 0.2), 100); 
                
                // 2. REDIRECCIÓN ACTUALIZADA A MENUPRINCIPAL.HTML
                setTimeout(() => {
                    window.location.href = "menuprincipal.html";
                }, 1200);

            } else {
                statusMessage.className = "status-message error";
                statusMessage.innerText = "CÓDIGO INCORRECTO. REINTENTAR.";
                playSound(150, 'sawtooth', 0.3);
                
                setTimeout(() => {
                    clearCode();
                }, 1200);
            }
        }
    </script>
</body>
</html>
