<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ORIGIN - Control de Acceso</title>
    <style>
        :root {
            --primary: #ff7675;
            --secondary: #74b9ff;
            --success: #55efc4;
            --warning: #ffeaa7;
            --dark: #ffffff;
            --text-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.10);
            --glass-border: rgba(255, 255, 255, 0.18);
            --glass-shadow: rgba(0, 0, 0, 0.4);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
        }

        body {
            background: linear-gradient(125deg, #050508, #0b0c10, #120136, #1a0826);
            background-size: 300% 300%;
            animation: gradientBG 15s ease infinite;
            color: var(--dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            padding: 40px 20px 20px 20px;
        }

        #stars-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: blink 3s infinite ease-in-out;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.1; transform: scale(0.6); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Contenedor Principal */
        .welcome-container {
            z-index: 1;
            text-align: center;
            max-width: 900px;
            width: 100%;
            margin: auto 0;
            animation: containerEntry 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes containerEntry {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header h1 {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ffffff, #74b9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(116, 185, 255, 0.2);
        }

        header p {
            color: #cbd5e1;
            font-size: 1.2rem;
            margin-bottom: 50px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Grid de Perfiles */
        .profiles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
            width: 100%;
            perspective: 1000px;
        }

        .profile-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 35px 25px;
            border-radius: 24px;
            box-shadow: 0 10px 40px var(--glass-shadow);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .profile-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
        }

        .profile-card:hover::before {
            left: 100%;
        }

        .profile-card:hover {
            transform: translateY(-10px) scale(1.03);
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.35);
            box-shadow: 0 15px 45px rgba(116, 185, 255, 0.2);
        }

        .avatar {
            font-size: 4rem;
            margin-bottom: 15px;
            filter: drop-shadow(0 8px 10px rgba(0,0,0,0.3));
            transition: transform 0.3s ease;
        }

        .profile-card:hover .avatar {
            transform: scale(1.15) rotate(5deg);
        }

        .profile-card h3 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .profile-card p {
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Modales / Paneles Emergentes */
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            text-align: center;
            transform: scale(0.85);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .overlay.active .glass-panel {
            transform: scale(1);
        }

        .glass-panel h2 {
            font-size: 1.6rem;
            margin-bottom: 15px;
            font-weight: 800;
        }

        /* Inputs y Teclado Numérico */
        .pin-input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            font-size: 1.4rem;
            letter-spacing: 4px;
            text-align: center;
            color: white;
            font-weight: 700;
            margin-bottom: 15px;
            outline: none;
        }

        .pin-input:focus {
            border-color: var(--secondary);
            background: rgba(255, 255, 255, 0.15);
        }

        /* Rejilla Teclado Táctil */
        .keyboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 18px;
        }

        .btn-key {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            padding: 12px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .btn-key:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }

        .btn-key:active {
            background: var(--secondary);
            color: var(--text-dark);
        }

        .btn-panel {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
        }

        .btn-confirm {
            background: linear-gradient(135deg, var(--secondary), #0984e3);
            color: white;
        }

        .btn-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(9, 132, 227, 0.4);
        }

        .btn-close {
            background: rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-close:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        /* Marcadores de Estadísticas */
        .stat-box {
            display: flex;
            justify-content: space-around;
            margin: 25px 0;
            gap: 15px;
        }

        .stat-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 16px;
            flex: 1;
        }

        .stat-item .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #94a3b8;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .stat-item .val {
            font-size: 1.8rem;
            font-weight: 800;
        }

        .val-mp { color: var(--success); text-shadow: 0 0 10px rgba(85, 239, 180, 0.3); }
        .val-xp { color: var(--secondary); text-shadow: 0 0 10px rgba(116, 185, 255, 0.3); }

        /* Footer de Autor */
        footer {
            z-index: 1;
            text-align: center;
            padding-top: 30px;
            width: 100%;
        }

        footer p {
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="stars-container"></div>

    <div class="welcome-container">
        <header>
            <h1>THE ORIGIN</h1>
            <p>La vida en una sola app</p>
        </header>

        <div class="profiles-grid">
            <div class="profile-card" onclick="abrirMatheo()">
                <div class="avatar">👑</div>
                <h3>Matheo</h3>
                <p>Administrador</p>
            </div>

            <div class="profile-card" onclick="abrirStats('Familia')">
                <div class="avatar">🏠</div>
                <h3>Familia</h3>
                <p>Modo Consulta</p>
            </div>

            <div class="profile-card" onclick="abrirStats('Invitados')">
                <div class="avatar">✨</div>
                <h3>Invitados</h3>
                <p>Modo Consulta</p>
            </div>
        </div>
    </div>

    <footer>
        <p>THE ORIGIN - By Matheo</p>
    </footer>

    <div class="overlay" id="modal-matheo">
        <div class="glass-panel">
            <h2>Acceso de Administrador</h2>
            <p style="color: #cbd5e1; font-size: 0.9rem; margin-bottom: 15px;">Introduce el código PIN</p>
            
            <input type="password" id="pin-field" class="pin-input" maxlength="6" placeholder="******">
            
            <div class="keyboard-grid">
                <button class="btn-key" onclick="pressKey('1')">1</button>
                <button class="btn-key" onclick="pressKey('2')">2</button>
                <button class="btn-key" onclick="pressKey('3')">3</button>
                <button class="btn-key" onclick="pressKey('4')">4</button>
                <button class="btn-key" onclick="pressKey('5')">5</button>
                <button class="btn-key" onclick="pressKey('6')">6</button>
                <button class="btn-key" onclick="pressKey('7')">7</button>
                <button class="btn-key" onclick="pressKey('8')">8</button>
                <button class="btn-key" onclick="pressKey('9')">9</button>
                <button class="btn-key" onclick="pressKey('clear')" style="color: var(--primary);">C</button>
                <button class="btn-key" onclick="pressKey('0')">0</button>
                <button class="btn-key" onclick="pressKey('back')">⌫</button>
            </div>

            <button class="btn-panel btn-confirm" onclick="verificarPin()">Verificar Identidad</button>
            <button class="btn-panel btn-close" onclick="cerrarModales()">Cancelar</button>
        </div>
    </div>

    <div class="overlay" id="modal-stats">
        <div class="glass-panel">
            <h2 id="stats-title">Estadísticas</h2>
            <p style="color: #cbd5e1; font-size: 0.9rem;">Métricas en tiempo real obtenidas del sistema</p>
            
            <div class="stat-box">
                <div class="stat-item">
                    <div class="label">Menú Puntos (MP)</div>
                    <div class="val val-mp" id="display-mp">0</div>
                </div>
                <div class="stat-item">
                    <div class="label">Experiencia (XP)</div>
                    <div class="val val-xp" id="display-xp">0</div>
                </div>
            </div>

            <button class="btn-panel btn-close" onclick="cerrarModales()">Volver</button>
        </div>
    </div>

    <script>
        // --- SINTETIZADOR DE AUDIO INTEGRADO ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(tipo) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (tipo === 'hover') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(450, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(850, audioCtx.currentTime + 0.12);
                gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.12);
                osc.start(); osc.stop(audioCtx.currentTime + 0.12);
            } else if (tipo === 'click') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(580, audioCtx.currentTime);
                osc.frequency.setValueAtTime(200, audioCtx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.08);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            } else if (tipo === 'error') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        document.querySelectorAll('.profile-card, .btn-key').forEach(elem => {
            elem.addEventListener('mouseenter', () => playSound('hover'));
        });

        // --- FONDO DE ESTRELLAS ANIMADAS ---
        function crearEstrellas() {
            const contenedor = document.getElementById('stars-container');
            for (let i = 0; i < 90; i++) {
                const estrella = document.createElement('div');
                estrella.classList.add('star');
                const tam = Math.random() * 2.2 + 0.5;
                estrella.style.width = `${tam}px`;
                estrella.style.height = `${tam}px`;
                estrella.style.left = `${Math.random() * 100}%`;
                estrella.style.top = `${Math.random() * 100}%`;
                estrella.style.animationDelay = `${Math.random() * 4}s`;
                contenedor.appendChild(estrella);
            }
        }
        crearEstrellas();

        // --- SISTEMA DEL TECLADO TÁCTIL ---
        const pinField = document.getElementById('pin-field');

        function pressKey(key) {
            playSound('click');
            if (key === 'clear') {
                pinField.value = '';
            } else if (key === 'back') {
                pinField.value = pinField.value.slice(0, -1);
            } else {
                if (pinField.value.length < 6) {
                    pinField.value += key;
                }
            }
        }

        // --- PANEL DE VERIFICACIÓN DE MATHEO ---
        function abrirMatheo() {
            playSound('click');
            document.getElementById('modal-matheo').classList.add('active');
            pinField.focus();
        }

        function verificarPin() {
            if (pinField.value === "010822") {
                playSound('click');
                window.location.href = "menuprincipal.html";
            } else {
                playSound('error');
                alert("Código PIN Incorrecto. Acceso denegado.");
                pinField.value = "";
            }
        }

        // --- PANEL DE ESTADÍSTICAS REALES (DATOS DEL LOCALSTORAGE) ---
        function abrirStats(perfil) {
            playSound('click');
            document.getElementById('stats-title').innerText = `Perfil: ${perfil}`;
            
            // Extracción de datos reales guardados por las otras secciones de la suite
            const aguaGuardada = parseInt(localStorage.getItem('trackerAgua')) || 0;
            const pasosGuardados = parseInt(localStorage.getItem('health-pasos')) || 0;
            const suenoGuardado = parseFloat(localStorage.getItem('health-sueno')) || 0;

            // Cálculo matemático en base a tu actividad real registrada
            const mpReal = 50 + (aguaGuardada * 20); 
            const xpReal = (pasosGuardados * 0.4) + (suenoGuardado * 100);

            // Inserción limpia en la pantalla de visualización
            document.getElementById('display-mp').innerText = Math.floor(mpReal);
            document.getElementById('display-xp').innerText = Math.floor(xpReal).toLocaleString();

            document.getElementById('modal-stats').classList.add('active');
        }

        function cerrarModales() {
            playSound('click');
            document.querySelectorAll('.overlay').forEach(ov => ov.classList.remove('active'));
            pinField.value = "";
        }

        // Soporte adicional por si escribes directamente con tu teclado físico
        pinField.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') verificarPin();
        });
    </script>
</body>
</html>
