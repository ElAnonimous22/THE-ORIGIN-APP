<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE ORIGIN - Acceso</title>
    <style>
        /* CONFIGURACIÓN GENERAL ESTILO ESPACIAL/GLASS */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at 80% 20%, #16102b 0%, #0b0c16 60%, #06070c 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* FONDO DE ESTRELLAS MINIMALISTAS */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            opacity: 0.2;
            z-index: 1;
        }

        /* INTERFAZ DE ARRANQUE EN NEGRO NEUTRO */
        #boot-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #06070c;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 40px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
            color: #a594fd;
            letter-spacing: 1px;
            overflow: hidden;
        }

        .boot-line {
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            animation: typing 0.3s steps(40, end) forwards;
        }

        /* CONTENEDOR PRINCIPAL INTERFAZ GLASSMORPHISM */
        .main-interface {
            position: relative;
            z-index: 5;
            display: none;
            width: 100%;
            max-width: 390px;
            background: rgba(20, 21, 33, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            text-align: center;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        h1 {
            font-size: 2rem;
            letter-spacing: -0.5px;
            color: #ffffff;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #8a8ca3;
            margin-bottom: 35px;
            font-weight: 400;
        }

        /* CASILLAS DE CÓDIGO CON LOS NÚMEROS REALES */
        .code-container {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 35px;
        }

        .code-slot {
            width: 48px;
            height: 56px;
            background: rgba(10, 11, 18, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 1.6rem;
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .code-slot.active {
            border-color: #7952f5;
            background: rgba(121, 82, 245, 0.1);
            box-shadow: 0 0 15px rgba(121, 82, 245, 0.25);
        }

        /* TECLADO INTEGRADO REDONDEADO SUTIL */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            width: 100%;
        }

        .key {
            width: 100%;
            height: 58px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #ffffff;
            font-size: 1.4rem;
            font-weight: 500;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .key:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .key:active {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(0.95);
        }

        /* TECLA BORRAR RÁPIDO */
        .key.clear {
            color: #ff4545;
            background: rgba(255, 69, 69, 0.05);
            border-color: rgba(255, 69, 69, 0.1);
        }
        .key.clear:hover {
            background: rgba(255, 69, 69, 0.12);
        }

        /* MENSAJE DE NOTIFICACIÓN INFERIOR */
        .status-message {
            margin-top: 25px;
            font-size: 0.85rem;
            height: 20px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .success { color: #34c759; }
        .error { color: #ff4545; }

        /* VIBRACIÓN DE ACCESO DENEGADO */
        .shake {
            animation: shakeAnim 0.4s ease-in-out;
            border-color: rgba(255, 69, 69, 0.4) !important;
        }

        /* ANIMACIONES */
        @keyframes typing { from { width: 0; } to { width: 100%; } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
    </style>
</head>
<body>

    <div id="boot-screen"></div>

    <div class="main-interface" id="terminal">
        <h1>THE ORIGIN</h1>
        <div class="subtitle">Tu vida entera en un solo lugar.</div>
        
        <div class="code-container">
            <div class="code-slot" id="slot0"></div>
            <div class="code-slot" id="slot1"></div>
            <div class="code-slot" id="slot2"></div>
            <div class="code-slot" id="slot3"></div>
            <div class="code-slot" id="slot4"></div>
            <div class="code-slot" id="slot5"></div>
        </div>

        <div class="keypad">
            <button class="key" onclick="pressKey('1')">1</button>
            <button class="key" onclick="pressKey('2')">2</button>
            <button class="key" onclick="pressKey('3')">3</button>
            <button class="key" onclick="pressKey('4')">4</button>
            <button class="key" onclick="pressKey('5')">5</button>
            <button class="key" onclick="pressKey('6')">6</button>
            <button class="key" onclick="pressKey('7')">7</button>
            <button class="key" onclick="pressKey('8')">8</button>
            <button class="key" onclick="pressKey('9')">9</button>
            <button class="key clear" onclick="clearCode()">C</button>
            <button class="key" onclick="pressKey('0')">0</button>
        </div>

        <div class="status-message" id="status"></div>
    </div>

    <script>
        const CORRECT_CODE = "010822";
        let currentInput = "";
        let isLocked = false;

        // EFECTOS DE AUDIO SUAVES (SINE CLICKS)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration, vol = 0.05) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e){}
        }

        // SECUENCIA DE LOGS INICIALES REVISADA
        const logs = [
            "Connecting to core ecosystem...",
            "Loading interface modules [29 active components]...",
            "Decrypting secure vault hashes...",
            "Establishing authorization link...",
            "Ready for access verification."
        ];
        
        const bootScreen = document.getElementById("boot-screen");
        let logIndex = 0;

        function printLog() {
            if (logIndex < logs.length) {
                const line = document.createElement("div");
                line.className = "boot-line";
                line.innerText = `> ${logs[logIndex]}`;
                bootScreen.appendChild(line);
                playTone(500 + (logIndex * 40), 'sine', 0.02, 0.02);
                logIndex++;
                setTimeout(printLog, 250);
            } else {
                setTimeout(() => {
                    bootScreen.style.opacity = "0";
                    bootScreen.style.transition = "opacity 0.4s ease";
                    setTimeout(() => {
                        bootScreen.style.display = "none";
                        document.getElementById("terminal").style.display = "block";
                        playTone(750, 'sine', 0.1, 0.04);
                    }, 400);
                }, 400);
            }
        }
        window.addEventListener('load', printLog);

        // ACTUALIZACIÓN CON NÚMEROS VISIBLES EN PANTALLA
        function updateDisplay() {
            for (let i = 0; i < 6; i++) {
                const slot = document.getElementById(`slot${i}`);
                if (i < currentInput.length) {
                    slot.innerText = currentInput[i];
                    slot.classList.add("active");
                } else {
                    slot.innerText = "";
                    slot.classList.remove("active");
                }
            }
        }

        function pressKey(num) {
            if (currentInput.length < 6 && !isLocked) {
                currentInput += num;
                playTone(900, 'sine', 0.03);
                updateDisplay();
                if (currentInput.length === 6) checkCode();
            }
        }

        function clearCode() {
            if (!isLocked) {
                currentInput = "";
                playTone(300, 'sine', 0.06);
                document.getElementById("status").innerText = "";
                updateDisplay();
            }
        }

        // CONTROL INTEGRADO DE TECLADO FÍSICO DESDE PC
        document.addEventListener('keydown', (e) => {
            if (bootScreen.style.display !== "none") return;
            if (/^[0-9]$/.test(e.key)) pressKey(e.key);
            else if (e.key === 'Backspace' || e.key.toLowerCase() === 'c') clearCode();
        });

        // VALIDACIÓN Y REDIRECCIÓN AUTOMÁTICA
        function checkCode() {
            const status = document.getElementById("status");
            const terminal = document.getElementById("terminal");
            isLocked = true;

            if (currentInput === CORRECT_CODE) {
                status.className = "status-message success";
                status.innerText = "Acceso concedido. Sincronizando...";
                playTone(580, 'sine', 0.08);
                setTimeout(() => playTone(780, 'sine', 0.12), 80);

                setTimeout(() => {
                    window.location.href = "menuprincipal.html";
                }, 1100);
            } else {
                status.className = "status-message error";
                status.innerText = "Código de autorización inválido";
                terminal.classList.add("shake");
                playTone(130, 'triangle', 0.3, 0.1);

                setTimeout(() => {
                    terminal.classList.remove("shake");
                    isLocked = false;
                    clearCode();
                }, 1200);
            }
        }
    </script>
</body>
</html>
